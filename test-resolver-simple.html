<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise Resolver Test</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
            background: #0a0a0a;
            color: #00ff00;
        }
        h1 { color: #00ff00; border-bottom: 2px solid #00ff00; padding-bottom: 10px; }
        .status { padding: 10px; margin: 10px 0; border-left: 4px solid #00ff00; }
        .success { color: #00ff00; }
        .error { color: #ff0000; border-left-color: #ff0000; }
        .warning { color: #ffaa00; border-left-color: #ffaa00; }
        .result { background: #1a1a1a; padding: 10px; margin: 5px 0; }
        pre { background: #1a1a1a; padding: 10px; overflow-x: auto; }
        #output { white-space: pre-wrap; }
        .button { background: #00ff00; color: #000; border: none; padding: 10px 20px; cursor: pointer; margin: 10px 5px; }
        .button:hover { background: #00cc00; }
    </style>
</head>
<body>
    <h1>🧪 Exercise Resolver Test Suite</h1>

    <div class="status">
        <strong>Environment:</strong>
        <div id="env-status">Checking...</div>
    </div>

    <button class="button" onclick="runTests()">▶ Run All Tests</button>
    <button class="button" onclick="clearOutput()">🗑 Clear Output</button>

    <div id="output"></div>

    <script type="module">
        import { exerciseResolver } from './lib/services/exercise-resolver.js'
        import { exerciseService } from './lib/services/exercise-library-service.js'
        import { GYM_TEMPLATES } from './lib/gym-templates.js'

        window.exerciseResolver = exerciseResolver
        window.exerciseService = exerciseService
        window.GYM_TEMPLATES = GYM_TEMPLATES

        document.getElementById('env-status').innerHTML = '✅ Modules loaded successfully'
    </script>

    <script>
        function log(message, type = 'info') {
            const output = document.getElementById('output')
            const div = document.createElement('div')
            div.className = `result ${type}`
            div.textContent = message
            output.appendChild(div)
            output.scrollTop = output.scrollHeight
        }

        function clearOutput() {
            document.getElementById('output').innerHTML = ''
        }

        async function runTests() {
            clearOutput()
            log('🚀 Starting Test Suite...', 'success')
            log('='.repeat(60))

            try {
                // Test 1: Database Connection
                log('\n🔌 Test 1: Database Connection')
                const exercises = await window.exerciseService.getAllExercises()
                log(`✅ Connected! Found ${exercises.length} exercises in database`, 'success')

                // Test 2: Template Exercises
                log('\n🧪 Test 2: Resolving Template Exercises')
                const uniqueExercises = new Set()

                for (const template of window.GYM_TEMPLATES) {
                    for (const dayKey in template.schedule) {
                        for (const exercise of template.schedule[dayKey].exercises) {
                            uniqueExercises.add(exercise.exerciseName)
                        }
                    }
                }

                log(`Found ${uniqueExercises.size} unique exercises in templates`)

                const results = []
                let found = 0
                let notFound = 0

                for (const exerciseName of uniqueExercises) {
                    const startTime = performance.now()
                    const exercise = await window.exerciseResolver.resolve(exerciseName)
                    const endTime = performance.now()

                    if (exercise) {
                        found++
                        results.push({ name: exerciseName, uuid: exercise.id, found: true })
                        log(`✅ ${exerciseName}`, 'success')
                        log(`   └─ UUID: ${exercise.id}`)
                        log(`   └─ ${exercise.muscleGroup} | ${exercise.equipmentType}`)
                        log(`   └─ ${(endTime - startTime).toFixed(2)}ms`)
                    } else {
                        notFound++
                        results.push({ name: exerciseName, found: false })
                        log(`❌ ${exerciseName} - NOT FOUND`, 'error')
                    }
                }

                // Test 3: Slug Resolution
                log('\n🔄 Test 3: Slug Resolution (Backwards Compatibility)')
                const testSlugs = ['barbell-bench-press', 'barbell-back-squat', 'deadlift']

                for (const slug of testSlugs) {
                    const exercise = await window.exerciseResolver.resolve(slug)
                    if (exercise) {
                        log(`✅ "${slug}" → "${exercise.name}"`, 'success')
                    } else {
                        log(`❌ "${slug}" → NOT FOUND`, 'error')
                    }
                }

                // Test 4: Cache Performance
                log('\n⚡ Test 4: Cache Performance')
                log('Warming cache...')
                await window.exerciseResolver.warmCache()

                const testExercise = 'Barbell Bench Press'
                const times = []

                for (let i = 0; i < 5; i++) {
                    const startTime = performance.now()
                    await window.exerciseResolver.resolve(testExercise)
                    const endTime = performance.now()
                    times.push((endTime - startTime).toFixed(2))
                }

                log(`First lookup: ${times[0]}ms`)
                log(`Cached lookups: ${times.slice(1).join('ms, ')}ms`)

                // Summary
                log('\n' + '='.repeat(60))
                log('📊 SUMMARY', 'success')
                log('='.repeat(60))
                log(`Total Exercises: ${uniqueExercises.size}`)
                log(`✅ Found: ${found}`)
                log(`❌ Not Found: ${notFound}`)
                log(`📈 Success Rate: ${((found / uniqueExercises.size) * 100).toFixed(2)}%`)

                if (notFound > 0) {
                    log('\n⚠️  Missing Exercises:', 'warning')
                    results.filter(r => !r.found).forEach(r => {
                        log(`  • ${r.name}`, 'warning')
                    })
                } else {
                    log('\n✅ All tests passed! Resolver ready for integration.', 'success')
                }

                log('='.repeat(60))

            } catch (error) {
                log(`\n❌ Test failed: ${error.message}`, 'error')
                log(error.stack, 'error')
            }
        }
    </script>
</body>
</html>
