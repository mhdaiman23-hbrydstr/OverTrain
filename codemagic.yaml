workflows:
  ios-capacitor-workflow:
    name: iOS Capacitor Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: OverTrain # Must match integration name in Codemagic UI
    environment:
      groups:
        - Supabase
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.overtrain.gooonemore
      vars:
        # Required environment variables - set these in Codemagic UI:
        # XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        # XCODE_SCHEME: "App"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        # Email for notifications (set in Codemagic UI or use hardcoded)
        NOTIFICATION_EMAIL: "mhd.aiman23@gmail.com"
        # Optional: Add Sentry auth token for error tracking
        # SENTRY_AUTH_TOKEN: your_sentry_token
      node: v20.11.0
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install Node.js dependencies
        script: |
          npm ci

      - name: Install CocoaPods dependencies
        script: |
          cd ios/App
          pod install

      - name: Verify Supabase environment variables
        script: |
          if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ]; then
            echo "ERROR: NEXT_PUBLIC_SUPABASE_URL is not set!"
            echo "Please add this environment variable in Codemagic UI under Environment Variables"
            exit 1
          fi
          if [ -z "$NEXT_PUBLIC_SUPABASE_ANON_KEY" ]; then
            echo "ERROR: NEXT_PUBLIC_SUPABASE_ANON_KEY is not set!"
            echo "Please add this environment variable in Codemagic UI under Environment Variables"
            exit 1
          fi
          echo "Supabase environment variables are configured"

      - name: Build Next.js app for native (static export)
        script: |
          npm run build:native

      - name: Sync Capacitor with iOS
        script: |
          npx cap sync ios

      - name: Set build number and version
        script: |
          # Read version from package.json (single source of truth)
          APP_VERSION=$(node -p "require('./package.json').version")
          echo "App version from package.json: $APP_VERSION"

          cd ios/App
          if [ -z "$BUILD_NUMBER" ]; then
            echo "BUILD_NUMBER is not set, defaulting to 1"
            BUILD_NUMBER=1
          fi
          # Set CFBundleVersion (build number) from Codemagic's BUILD_NUMBER
          agvtool new-version -all "$BUILD_NUMBER"
          # Set CFBundleShortVersionString (marketing version) from package.json
          agvtool new-marketing-version "$APP_VERSION"

      - name: Prepare signing assets (profiles & export options)
        script: |
          # Fetch and apply provisioning profiles + generate export options plist
          xcode-project use-profiles

      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      # Submit to App Store Connect / TestFlight
      app_store_connect:
        auth: integration

        # Submit to TestFlight for internal testing
        submit_to_testflight: true

        # Optional: Auto-submit to App Store (beta)
        # submit_to_app_store: false

      email:
        recipients:
          - mhd.aiman23@gmail.com
        notify:
          success: true
          failure: true

  android-capacitor-workflow:
    name: Android Capacitor Build
    max_build_duration: 120
    instance_type: linux_x2
    environment:
      android_signing:
        - overtrain_keystore # Upload keystore in Codemagic UI → Code signing → Android
      groups:
        - google_play_credentials # GCLOUD_SERVICE_ACCOUNT_CREDENTIALS (JSON key)
        - Supabase # NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY
      vars:
        PACKAGE_NAME: "app.overtrain.gooonemore"
      node: v20.11.0
      java: 17
    scripts:
      - name: Install Node.js dependencies
        script: |
          npm ci

      - name: Verify Supabase environment variables
        script: |
          if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ]; then
            echo "ERROR: NEXT_PUBLIC_SUPABASE_URL is not set!"
            exit 1
          fi
          if [ -z "$NEXT_PUBLIC_SUPABASE_ANON_KEY" ]; then
            echo "ERROR: NEXT_PUBLIC_SUPABASE_ANON_KEY is not set!"
            exit 1
          fi
          echo "Supabase environment variables are configured"

      - name: Build Next.js app for native (static export)
        script: |
          npm run build:native

      - name: Sync Capacitor with Android
        script: |
          npx cap sync android

      - name: Set version code and wire keystore
        script: |
          cd android

          # Use Codemagic build number as versionCode
          BNUM=${BUILD_NUMBER:-1}
          sed -i "s/versionCode [0-9]*/versionCode $BNUM/" app/build.gradle
          echo "Set versionCode to $BNUM"

          # Point build.gradle at the Codemagic-managed keystore
          # CM_KEYSTORE_PATH, CM_KEYSTORE_PASSWORD, CM_KEY_ALIAS, CM_KEY_PASSWORD
          # are set automatically by the android_signing integration
          cat > keystore.properties <<PROPS
          KEYSTORE_PATH=$CM_KEYSTORE_PATH
          KEYSTORE_PASSWORD=$CM_KEYSTORE_PASSWORD
          KEY_ALIAS=$CM_KEY_ALIAS
          KEY_PASSWORD=$CM_KEY_PASSWORD
          PROPS

      - name: Build Android AAB and APK
        script: |
          cd android
          # AAB for Play Store
          ./gradlew bundleRelease \
            -PKEYSTORE_PATH="$CM_KEYSTORE_PATH" \
            -PKEYSTORE_PASSWORD="$CM_KEYSTORE_PASSWORD" \
            -PKEY_ALIAS="$CM_KEY_ALIAS" \
            -PKEY_PASSWORD="$CM_KEY_PASSWORD"
          # APK for direct install / testing
          ./gradlew assembleRelease \
            -PKEYSTORE_PATH="$CM_KEYSTORE_PATH" \
            -PKEYSTORE_PASSWORD="$CM_KEYSTORE_PASSWORD" \
            -PKEY_ALIAS="$CM_KEY_ALIAS" \
            -PKEY_PASSWORD="$CM_KEY_PASSWORD"

    artifacts:
      - android/app/build/outputs/**/*.apk
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/mapping.txt

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true

      email:
        recipients:
          - mhd.aiman23@gmail.com
        notify:
          success: true
          failure: true
