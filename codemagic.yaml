workflows:
  ios-capacitor-workflow:
    name: iOS Capacitor Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: OverTrain # Configure this in Codemagic UI
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.overtrain.gooonemore
        # Let Codemagic auto-create certificate and profile
      vars:
        # Required environment variables - set these in Codemagic UI:
        # XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        # XCODE_SCHEME: "App"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        # Email for notifications (set in Codemagic UI or use hardcoded)
        NOTIFICATION_EMAIL: "mhd.aiman23@gmail.com"
        # Optional: Add Sentry auth token for error tracking
        # SENTRY_AUTH_TOKEN: your_sentry_token
      node: v20.11.0
      xcode: 15.4
      cocoapods: default
    scripts:
      - name: Install Node.js dependencies
        script: |
          npm ci

      - name: Install CocoaPods dependencies
        script: |
          cd ios/App
          pod install

      - name: Build Next.js app for native (static export)
        script: |
          npm run build:native

      - name: Sync Capacitor with iOS
        script: |
          npx cap sync ios

      - name: Set build number and version
        script: |
          # Auto-increment build number using latest TestFlight build
          cd ios/App
          LATEST_BUILD=$(app-store-connect get-latest-testflight-build-number "app.overtrain.gooonemore")
          NEW_BUILD=$((LATEST_BUILD + 1))
          agvtool new-version -all $NEW_BUILD

      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      # Submit to App Store Connect / TestFlight
      app_store_connect:
        auth: integration

        # Submit to TestFlight for internal testing
        submit_to_testflight: true

        # Optional: Auto-submit to App Store (beta)
        # submit_to_app_store: false

      email:
        recipients:
          - mhd.aiman23@gmail.com
        notify:
          success: true
          failure: true

  # Optional: Android workflow for completeness
  android-capacitor-workflow:
    name: Android Capacitor Build
    max_build_duration: 120
    instance_type: linux_x2
    environment:
      android_signing:
        - overtrain_keystore # Configure this in Codemagic UI
      groups:
        - android_credentials # Add KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD
      vars:
        PACKAGE_NAME: "app.overtrain.gooonemore"
        NOTIFICATION_EMAIL: "mhd.aiman23@gmail.com"
      node: v20.11.0
      java: 17
    scripts:
      - name: Install Node.js dependencies
        script: |
          npm ci

      - name: Build Next.js app for native (static export)
        script: |
          npm run build:native

      - name: Sync Capacitor with Android
        script: |
          npx cap sync android

      - name: Set version code
        script: |
          cd android
          # Auto-increment version code based on build number
          echo "VERSION_CODE=$BUILD_NUMBER" >> gradle.properties

      - name: Build Android release
        script: |
          cd android
          ./gradlew assembleRelease

    artifacts:
      - android/app/build/outputs/**/*.apk
      - android/app/build/outputs/**/*.aab

    publishing:
      # Optional: Submit to Google Play
      # google_play:
      #   credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
      #   track: internal

      email:
        recipients:
          - mhd.aiman23@gmail.com
        notify:
          success: true
          failure: true
