<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise Library Integration Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-50 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-8">Exercise Library Integration Test</h1>
        
        <!-- Test Results -->
        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4">Test Results</h2>
            <div id="test-results" class="space-y-2"></div>
        </div>

        <!-- Excel Data Preview -->
        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4">Excel Data Preview</h2>
            <div id="excel-preview" class="text-sm text-gray-600"></div>
        </div>

        <!-- Muscle Groups -->
        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4">Muscle Groups Found</h2>
            <div id="muscle-groups" class="grid grid-cols-3 gap-2"></div>
        </div>

        <!-- Equipment Types -->
        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4">Equipment Types Found</h2>
            <div id="equipment-types" class="grid grid-cols-2 gap-2"></div>
        </div>

        <!-- Sample Exercises -->
        <div class="bg-white rounded-lg shadow p-6">
            <h2 class="text-xl font-semibold mb-4">Sample Exercises (First 10)</h2>
            <div id="sample-exercises" class="space-y-2"></div>
        </div>
    </div>

    <script>
        class ExerciseLibraryTester {
            constructor() {
                this.testResults = [];
            }

            log(test, passed, message) {
                this.testResults.push({ test, passed, message });
                this.updateTestResults();
            }

            updateTestResults() {
                const resultsDiv = document.getElementById('test-results');
                resultsDiv.innerHTML = this.testResults.map(result => `
                    <div class="flex items-center gap-2 p-2 rounded ${result.passed ? 'bg-green-100' : 'bg-red-100'}">
                        <span class="text-lg">${result.passed ? '✅' : '❌'}</span>
                        <span class="font-medium">${result.test}:</span>
                        <span class="${result.passed ? 'text-green-700' : 'text-red-700'}">${result.message}</span>
                    </div>
                `).join('');
            }

            async runTests() {
                this.log('Excel File Access', false, 'Starting test...');

                try {
                    // Test 1: Check if XLSX library is loaded
                    if (typeof XLSX === 'undefined') {
                        this.log('XLSX Library', false, 'XLSX library not loaded');
                        return;
                    }
                    this.log('XLSX Library', true, 'XLSX library available');

                    // Test 2: Try to read the Excel file
                    const response = await fetch('exercise_library_full.xlsx');
                    if (!response.ok) {
                        this.log('Excel File Access', false, `Failed to fetch: ${response.status}`);
                        return;
                    }
                    this.log('Excel File Access', true, 'File accessible');

                    const arrayBuffer = await response.arrayBuffer();
                    const workbook = XLSX.read(arrayBuffer);
                    
                    if (workbook.SheetNames.length === 0) {
                        this.log('Excel Sheets', false, 'No sheets found');
                        return;
                    }
                    this.log('Excel Sheets', true, `Found ${workbook.SheetNames.length} sheet(s)`);

                    // Test 3: Read data from first sheet
                    const sheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[sheetName];
                    const data = XLSX.utils.sheet_to_json(worksheet);
                    
                    this.log('Data Reading', true, `Read ${data.length} rows`);
                    
                    if (data.length === 0) {
                        this.log('Data Validation', false, 'No data found');
                        return;
                    }

                    // Test 4: Check required columns
                    const firstRow = data[0];
                    const requiredColumns = ['Name', 'Body Part', 'Equipment Type'];
                    const missingColumns = requiredColumns.filter(col => !(col in firstRow));
                    
                    if (missingColumns.length > 0) {
                        this.log('Column Validation', false, `Missing columns: ${missingColumns.join(', ')}`);
                        return;
                    }
                    this.log('Column Validation', true, 'All required columns present');

                    // Test 5: Validate data quality
                    let validRows = 0;
                    let invalidRows = 0;
                    const muscleGroups = new Set();
                    const equipmentTypes = new Set();

                    data.forEach((row, index) => {
                        const name = row['Name']?.toString().trim();
                        const bodyPart = row['Body Part']?.toString().trim();
                        const equipment = row['Equipment Type']?.toString().trim();

                        if (name && bodyPart && equipment && name.length > 1) {
                            validRows++;
                            muscleGroups.add(bodyPart);
                            equipmentTypes.add(equipment);
                        } else {
                            invalidRows++;
                        }
                    });

                    this.log('Data Quality', true, `${validRows} valid, ${invalidRows} invalid rows`);
                    this.log('Muscle Groups', true, `Found ${muscleGroups.size} unique muscle groups`);
                    this.log('Equipment Types', true, `Found ${equipmentTypes.size} unique equipment types`);

                    // Test 6: Check for expected muscle groups
                    const expectedMuscleGroups = ['Biceps', 'Triceps', 'Chest', 'Back', 'Shoulders'];
                    const foundExpected = expectedMuscleGroups.filter(group => 
                        Array.from(muscleGroups).some(mg => mg.toLowerCase().includes(group.toLowerCase()))
                    );
                    
                    this.log('Expected Muscle Groups', true, `Found ${foundExpected.length}/${expectedMuscleGroups.length} expected groups`);

                    // Update UI with data
                    this.updateUI(data, muscleGroups, equipmentTypes);

                } catch (error) {
                    this.log('Error', false, error.message);
                    console.error('Test error:', error);
                }
            }

            updateUI(data, muscleGroups, equipmentTypes) {
                // Update Excel preview
                document.getElementById('excel-preview').innerHTML = `
                    <p><strong>Total Rows:</strong> ${data.length}</p>
                    <p><strong>Columns:</strong> ${Object.keys(data[0] || {}).join(', ')}</p>
                    <p><strong>Sample Row:</strong> ${JSON.stringify(data[0], null, 2)}</p>
                `;

                // Update muscle groups
                const muscleGroupsDiv = document.getElementById('muscle-groups');
                const sortedMuscleGroups = Array.from(muscleGroups).sort();
                muscleGroupsDiv.innerHTML = sortedMuscleGroups.map(group => `
                    <div class="px-3 py-1 bg-blue-100 text-blue-800 rounded-full text-sm">
                        ${group}
                    </div>
                `).join('');

                // Update equipment types
                const equipmentTypesDiv = document.getElementById('equipment-types');
                const sortedEquipmentTypes = Array.from(equipmentTypes).sort();
                equipmentTypesDiv.innerHTML = sortedEquipmentTypes.map(type => `
                    <div class="px-3 py-1 bg-green-100 text-green-800 rounded-full text-sm">
                        ${type}
                    </div>
                `).join('');

                // Update sample exercises
                const sampleExercisesDiv = document.getElementById('sample-exercises');
                const sampleData = data.slice(0, 10);
                sampleExercisesDiv.innerHTML = sampleData.map((row, index) => `
                    <div class="p-3 bg-gray-50 rounded border">
                        <div class="font-medium">${row['Name']}</div>
                        <div class="text-sm text-gray-600">
                            ${row['Body Part']} • ${row['Equipment Type']}
                        </div>
                    </div>
                `).join('');
            }
        }

        // Run tests when page loads
        document.addEventListener('DOMContentLoaded', () => {
            const tester = new ExerciseLibraryTester();
            tester.runTests();
        });
    </script>
</body>
</html>
